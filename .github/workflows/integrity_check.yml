name: Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integrity-check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jinja2

      - name: Download WinLibs GCC 13.2.0
        shell: pwsh
        run: |
          Invoke-WebRequest `
            -Uri "https://github.com/brechtsanders/winlibs_mingw/releases/download/13.2.0posix-17.0.6-11.0.1-ucrt-r5/winlibs-i686-posix-dwarf-gcc-13.2.0-llvm-17.0.6-mingw-w64ucrt-11.0.1-r5.zip" `
            -OutFile winlibs.zip

          Expand-Archive winlibs.zip -DestinationPath C:\winlibs

          $root = Get-ChildItem C:\winlibs -Directory | Select-Object -First 1

          "$($root.FullName)\bin" | Out-File `
            -FilePath $env:GITHUB_PATH `
            -Encoding utf8 `
            -Append

      - name: Verify toolchain
        shell: cmd
        run: |
          where gcc
          where g++
          where ld

          gcc --version
          g++ --version
          ld --version

      - name: Run validation scripts
        shell: cmd
        run: |
          python scripts\Ghidra\CheckHeaderDuplicates.py
          python scripts\Ghidra\check_data_symbols_dups.py

      - name: Generate placeholder hook file
        shell: cmd
        run: |
          if not exist src\generated mkdir src\generated
          type nul > src\generated\hook_generated.c

      - name: Configure
        shell: cmd
        run: |
          cmake -B build -G Ninja ^
            -DCMAKE_BUILD_TYPE=Release ^
            -DCMAKE_C_COMPILER=gcc ^
            -DCMAKE_CXX_COMPILER=g++ ^
            -DPYTHON_EXECUTABLE="%pythonLocation%\python.exe"

      - name: Build
        shell: cmd
        run: |
          cmake --build build --config Release
