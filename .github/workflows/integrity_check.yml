name: Integrity Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  integrity-check:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW32
          install: >
            mingw-w64-i686-gcc
            mingw-w64-i686-cmake
            mingw-w64-i686-ninja
            mingw-w64-i686-python

      - name: Compile dinput.dll mod, check for duplicate functions and symbols
        shell: msys2 {0}
        run: |
          set -e

          PYTHON=$(cygpath -u "$pythonLocation")/python.exe

          # Fast smoke tests before compilation
          "$PYTHON" scripts/Ghidra/CheckHeaderDuplicates.py
          "$PYTHON" scripts/Ghidra/check_data_symbols_dups.py

          # Compilation check
          cd dinput_hook
          cmake .. -DCMAKE_C_COMPILER=i686-w64-mingw32-gcc -DCMAKE_CXX_COMPILER=i686-w64-mingw32-g++ -DCMAKE_BUILD_TYPE=Release -DPYTHON_EXECUTABLE="$PYTHON"
          ninja

          if [ ! -f ".dinput_hook/libdinput_hook.dll" ]; then
            echo "dinput dll mod has not been compiled successfully"
            exit 1
          fi

